<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  :root {
    --icon: "__ICON__";
    --bg: #f8f9fa; --card: #fff; --text: #1a1a1a; --sub: #666;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1a1a1a; --card: #2a2a2a; --text: #e8e8e8; --sub: #aaa;
            --shadow: 0 2px 12px rgba(0,0,0,.4); }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: var(--card); border-radius: 12px; padding: 2.5rem;
    box-shadow: var(--shadow); text-align: center; max-width: 420px; width: 90%;
  }
  .icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .icon::after { content: var(--icon); }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
  p  { color: var(--sub); font-size: .95rem; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"></div>
  <h1>__HEADING__</h1>
  <p>__MESSAGE__</p>
</div>
</body>
</html>
